<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" role="img" aria-labelledby="t d">
  <title id="t">Project thumbnail placeholder</title>
  <desc id="d">Dark gradient placeholder for project cards.</desc>
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1e3558"/>
      <stop offset="100%" stop-color="#0b1425"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#g)"/>
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#e6edf7" font-family="Inter, Arial, sans-serif" font-size="26">Project Preview</text>
</svg>
